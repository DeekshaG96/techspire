<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aura - Deep Vision Diagnostics</title>
    <!-- MediaPipe Dependencies -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/control_utils/control_utils.js"
        crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"
        crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js" crossorigin="anonymous"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #020205;
            color: white;
            font-family: 'Inter', system-ui, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }

        .container {
            position: relative;
            width: 100%;
            max-width: 800px;
            aspect-ratio: 4/3;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 40px rgba(155, 134, 189, 0.2);
            background: #111;
        }

        video {
            display: none;
            /* Hide original video, we draw on canvas */
        }

        canvas {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1);
            /* Mirror */
        }

        /* 🤖 Overlay UI */
        .hud {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(10px);
            padding: 15px 25px;
            border-radius: 15px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .status {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 5px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .ear-value {
            font-size: 0.9rem;
            color: #aaa;
            font-family: monospace;
        }

        /* Status Colors */
        .status-normal {
            color: #4ade80;
        }

        .status-stress {
            color: #fb923c;
        }

        .status-drowsy {
            color: #f87171;
        }

        .back-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.2);
            border: none;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            color: white;
            text-decoration: none;
            backdrop-filter: blur(10px);
            z-index: 10;
        }

        .loader {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 1.2rem;
            color: #9B86BD;
            text-align: center;
        }
    </style>
</head>

<body>

    <a href="wellbeing-hub.html" class="back-btn"><i class="ph ph-x"></i></a>

    <div class="container">
        <video id="input_video"></video>
        <canvas id="output_canvas"></canvas>
        <div class="loader" id="loader"><i class="ph ph-spinner ph-spin"></i> Initializing Deep Vision...</div>

        <div class="hud" id="hud" style="display:none;">
            <div class="status" id="status-text"><i class="ph-fill ph-check-circle"></i> NORMAL</div>
            <div class="ear-value">EAR Focus: <span id="ear-val">0.00</span></div>
        </div>
    </div>

    <script>
        const videoElement = document.getElementById('input_video');
        const canvasElement = document.getElementById('output_canvas');
        const canvasCtx = canvasElement.getContext('2d');
        const hud = document.getElementById('hud');
        const loader = document.getElementById('loader');
        const statusText = document.getElementById('status-text');
        const earVal = document.getElementById('ear-val');

        // MediaPipe Face Mesh Indices for Eyes
        const LEFT_EYE = [33, 160, 158, 133, 153, 144];
        const RIGHT_EYE = [362, 385, 387, 263, 373, 380];

        let eyeClosedFrames = 0;

        // Euclidean Distance
        function euclideanNorm(p1, p2) {
            return Math.hypot(p1.x - p2.x, p1.y - p2.y);
        }

        // Calculate Eye Aspect Ratio (EAR)
        function eyeAspectRatio(eye, landmarks) {
            const p0 = landmarks[eye[0]];
            const p1 = landmarks[eye[1]];
            const p2 = landmarks[eye[2]];
            const p3 = landmarks[eye[3]];
            const p4 = landmarks[eye[4]];
            const p5 = landmarks[eye[5]];

            const A = euclideanNorm(p1, p5); // Vertical 1
            const B = euclideanNorm(p2, p4); // Vertical 2
            const C = euclideanNorm(p0, p3); // Horizontal

            return (A + B) / (2.0 * C);
        }

        function onResults(results) {
            if (loader.style.display !== 'none') {
                loader.style.display = 'none';
                hud.style.display = 'block';
            }

            // Draw Video Frame directly onto Canvas
            canvasCtx.save();
            canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
            canvasCtx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);

            let currentStatus = "NORMAL";
            let currentStatusHTML = '<i class="ph-fill ph-check-circle"></i> NORMAL';
            let statusClass = "status-normal";
            let avgEAR = 0;

            if (results.multiFaceLandmarks && results.multiFaceLandmarks.length > 0) {
                const landmarks = results.multiFaceLandmarks[0];

                // Draw Mesh
                drawConnectors(canvasCtx, landmarks, FACEMESH_TESSELATION,
                    { color: 'rgba(200,200,200,0.1)', lineWidth: 1 });

                // Highlight Eyes
                drawConnectors(canvasCtx, landmarks, FACEMESH_LEFT_EYE, { color: '#9B86BD', lineWidth: 2 });
                drawConnectors(canvasCtx, landmarks, FACEMESH_RIGHT_EYE, { color: '#9B86BD', lineWidth: 2 });

                // Calculate EAR
                const leftEAR = eyeAspectRatio(LEFT_EYE, landmarks);
                const rightEAR = eyeAspectRatio(RIGHT_EYE, landmarks);
                avgEAR = (leftEAR + rightEAR) / 2.0;

                // Stress/Drowsiness Thresholds
                if (avgEAR < 0.25) {
                    eyeClosedFrames++;
                } else {
                    eyeClosedFrames = 0;
                }

                if (eyeClosedFrames > 15) {
                    currentStatus = "DROWSY";
                    currentStatusHTML = '<i class="ph-fill ph-moon"></i> DROWSY / TIRED';
                    statusClass = "status-drowsy";
                } else if (avgEAR < 0.28) { // Adjusted for webcams
                    currentStatus = "STRESS";
                    currentStatusHTML = '<i class="ph-fill ph-warning"></i> STRESS / ANXIETY';
                    statusClass = "status-stress";
                }
            }

            // Update HUD
            statusText.innerHTML = currentStatusHTML;
            statusText.className = "status " + statusClass;
            earVal.innerText = avgEAR.toFixed(3);

            // Optional: Haptic / Audio triggers could be added here if Stress is detected continuously

            canvasCtx.restore();
        }

        // Initialize MediaPipe Face Mesh
        const faceMesh = new FaceMesh({
            locateFile: (file) => {
                return `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`;
            }
        });

        faceMesh.setOptions({
            maxNumFaces: 1,
            refineLandmarks: true,
            minDetectionConfidence: 0.5,
            minTrackingConfidence: 0.5
        });

        faceMesh.onResults(onResults);

        let lastFrameTime = 0;

        async function startCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { width: 800, height: 600 } });
                videoElement.srcObject = stream;

                // Once metadata is loaded, we can continuously poll for frames
                videoElement.onloadedmetadata = () => {
                    videoElement.play();

                    canvasElement.width = videoElement.videoWidth;
                    canvasElement.height = videoElement.videoHeight;

                    processVideo();
                };
            } catch (err) {
                console.error("Camera access error:", err);
                loader.innerHTML = `<i class="ph ph-warning" style="color: #FF5A5F;"></i> Camera Access Denied<br><small style="color:#aaa; font-size:0.8rem;">${err.message || 'Please allow webcam permissions or check connection.'}</small>`;
                hud.style.display = 'none';
            }
        }

        async function processVideo() {
            if (videoElement.currentTime !== lastFrameTime) {
                lastFrameTime = videoElement.currentTime;
                await faceMesh.send({ image: videoElement });
            }
            requestAnimationFrame(processVideo);
        }

        startCamera();
    </script>
</body>

</html>
