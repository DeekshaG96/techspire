<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Focus Tree - Aura</title>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --bg-cream: #FDFBF7;
            --sage-green: #9CBFA7;
            --sage-dark: #6B8E76;
            --pastel-lavender: #E0CBE6;
            --text-dark: #373F41;
            --text-muted: #828B8E;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-cream);
            color: var(--text-dark);
            font-family: 'Inter', system-ui, sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow: hidden;
        }

        header {
            width: 100%;
            padding: 24px;
            display: flex;
            align-items: center;
            gap: 16px;
            position: absolute;
            top: 0;
            z-index: 10;
        }

        .back-btn {
            background: #fff;
            border: none;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05);
            text-decoration: none;
            color: var(--text-dark);
            flex-shrink: 0;
        }

        h1 {
            margin: 0;
            font-size: 1.4rem;
            font-weight: 600;
        }

        .container {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            position: relative;
        }

        /* The SVG Tree */
        svg {
            width: 300px;
            height: 400px;
            margin-bottom: 20px;
            overflow: visible;
        }

        .tree-path {
            fill: none;
            stroke: var(--sage-dark);
            stroke-width: 8;
            stroke-linecap: round;
            stroke-linejoin: round;
            stroke-dasharray: 1000;
            stroke-dashoffset: 1000;
            transition: stroke-dashoffset 1s linear;
        }

        .leaf {
            fill: var(--sage-green);
            opacity: 0;
            transform-origin: center;
            transform: scale(0);
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .leaf.grown {
            opacity: 1;
            transform: scale(1);
        }

        /* Timer UI */
        .controls {
            background: #fff;
            padding: 24px;
            border-radius: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
            text-align: center;
            width: 90%;
            max-width: 350px;
            z-index: 10;
        }

        .time-display {
            font-size: 3rem;
            font-weight: 700;
            color: var(--sage-dark);
            font-variant-numeric: tabular-nums;
            margin-bottom: 20px;
        }

        .btn-group {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-bottom: 20px;
        }

        .time-btn {
            background: var(--bg-cream);
            border: 1px solid transparent;
            padding: 8px 16px;
            border-radius: 20px;
            color: var(--text-muted);
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .time-btn.active {
            background: var(--sage-green-light);
            color: var(--sage-dark);
            border-color: var(--sage-green);
        }

        .action-btn {
            background: var(--sage-green);
            color: #fff;
            border: none;
            width: 100%;
            padding: 16px;
            border-radius: 20px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(156, 191, 167, 0.4);
            transition: transform 0.2s;
        }

        .action-btn:active {
            transform: scale(0.95);
        }

        /* Completion Modal */
        .modal {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(253, 251, 247, 0.9);
            backdrop-filter: blur(10px);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s;
            z-index: 100;
            text-align: center;
            padding: 24px;
        }

        .modal.active {
            opacity: 1;
            pointer-events: all;
        }

        .modal-icon {
            font-size: 5rem;
            color: var(--sage-green);
            margin-bottom: 20px;
        }

        .modal-points {
            font-weight: 700;
            color: #F5A623;
            font-size: 1.2rem;
            margin-top: 10px;
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }
    </style>
</head>

<body>

    <header>
        <a href="wellbeing-hub.html" class="back-btn"><i class="ph ph-arrow-left"></i></a>
        <h1>Focus Tree</h1>
    </header>

    <div class="container">

        <svg viewBox="0 0 200 300" id="treeSvg">
            <!-- Ground -->
            <path d="M 50 280 L 150 280" stroke="var(--sage-dark)" stroke-width="4" stroke-linecap="round" />

            <!-- Trunk & Branches (Total length ~500) -->
            <path id="treePath" class="tree-path"
                d="M 100 280 Q 105 200 100 150 Q 80 100 50 70 M 100 150 Q 130 110 160 80 M 100 200 Q 130 180 150 150 M 100 120 Q 90 80 100 40" />

            <!-- Leaves (Grouped by appearance stages) -->
            <g id="leafGroup1">
                <circle cx="50" cy="70" r="15" class="leaf" />
                <circle cx="40" cy="80" r="10" class="leaf" />
                <circle cx="60" cy="65" r="12" class="leaf" />
            </g>
            <g id="leafGroup2">
                <circle cx="160" cy="80" r="14" class="leaf" />
                <circle cx="170" cy="90" r="10" class="leaf" />
            </g>
            <g id="leafGroup3">
                <circle cx="150" cy="150" r="12" class="leaf" />
                <circle cx="160" cy="140" r="8" class="leaf" />
            </g>
            <g id="leafGroup4">
                <circle cx="100" cy="40" r="18" class="leaf" />
                <circle cx="90" cy="50" r="12" class="leaf" />
                <circle cx="115" cy="45" r="14" class="leaf" />
                <circle cx="100" cy="25" r="15" class="leaf" />
            </g>
        </svg>

        <div class="controls">
            <div class="time-display" id="timer">01:00</div>

            <div class="btn-group" id="timeSelection">
                <button class="time-btn active" onclick="setTime(1)">1 Min</button>
                <button class="time-btn" onclick="setTime(5)">5 Min</button>
                <button class="time-btn" onclick="setTime(15)">15 Min</button>
            </div>

            <button class="action-btn" id="startBtn" onclick="toggleTimer()">Start Focusing</button>
        </div>

    </div>

    <!-- Success Modal -->
    <div class="modal" id="successModal">
        <div class="modal-icon"><i class="ph-fill ph-tree"></i></div>
        <h2 style="font-size:2rem; margin:0 0 10px;">Deep Roots!</h2>
        <p style="color:var(--text-muted); font-size:1.1rem; line-height:1.4;">You maintained focus and helped your tree
            blossom. Your mind is calmer.</p>
        <div class="modal-points">+<span id="ptsEarned">1</span> <i class="ph-fill ph-leaf"></i> Zen Points</div>
        <button class="action-btn" style="margin-top:30px; width:200px;"
            onclick="window.location.href='wellbeing-hub.html'">Return to Hub</button>
    </div>

    <script>
        let duration = 60; // seconds
        let remaining = duration;
        let isRunning = false;
        let timerInterval;

        const path = document.getElementById('treePath');
        const pathLength = path.getTotalLength();
        path.style.strokeDasharray = pathLength;
        path.style.strokeDashoffset = pathLength;

        function setTime(mins) {
            if (isRunning) return;
            document.querySelectorAll('.time-btn').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
            duration = mins * 60;
            remaining = duration;
            updateDisplay();

            // Reset tree
            path.style.transition = 'none';
            path.style.strokeDashoffset = pathLength;
            document.querySelectorAll('.leaf').forEach(l => l.classList.remove('grown'));
        }

        function updateDisplay() {
            let m = Math.floor(remaining / 60);
            let s = remaining % 60;
            document.getElementById('timer').innerText = `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
        }

        function toggleTimer() {
            const btn = document.getElementById('startBtn');
            if (isRunning) { // Stop/Cancel
                clearInterval(timerInterval);
                isRunning = false;
                btn.innerText = "Start Focusing";
                btn.style.background = 'var(--sage-green)';
                path.style.transition = 'stroke-dashoffset 0.5s linear'; // pause animation somewhat
                document.getElementById('timeSelection').style.pointerEvents = 'all';
                document.getElementById('timeSelection').style.opacity = '1';
            } else { // Start
                isRunning = true;
                btn.innerText = "Give Up";
                btn.style.background = '#FFB3B3';
                btn.style.color = '#D32F2F';

                document.getElementById('timeSelection').style.pointerEvents = 'none';
                document.getElementById('timeSelection').style.opacity = '0.5';

                path.style.transition = `stroke-dashoffset 1s linear`;

                timerInterval = setInterval(() => {
                    remaining--;
                    updateDisplay();

                    // Animate Growth
                    let progress = 1 - (remaining / duration);
                    path.style.strokeDashoffset = pathLength * (1 - progress);

                    // Sprout leaves based on progress thresholds
                    if (progress > 0.25) sprout('leafGroup3');
                    if (progress > 0.50) sprout('leafGroup2');
                    if (progress > 0.75) sprout('leafGroup1');

                    if (remaining <= 0) {
                        finishFocus();
                    }
                }, 1000);
            }
        }

        function sprout(groupId) {
            document.querySelectorAll(`#${groupId} .leaf`).forEach(l => l.classList.add('grown'));
        }

        function finishFocus() {
            clearInterval(timerInterval);
            sprout('leafGroup4'); // Crown
            path.style.strokeDashoffset = 0;

            // Gamification logic
            let pts = Math.max(1, Math.floor(duration / 60));
            document.getElementById('ptsEarned').innerText = pts;

            let currentPoints = parseInt(localStorage.getItem('zenPoints') || '0');
            localStorage.setItem('zenPoints', currentPoints + pts);

            setTimeout(() => {
                document.getElementById('successModal').classList.add('active');
                confetti({
                    particleCount: 150,
                    spread: 80,
                    origin: { y: 0.6 },
                    colors: ['#9CBFA7', '#E0CBE6', '#F5A623']
                });
            }, 1000);
        }

        updateDisplay();
    </script>
</body>

</html>
