<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Zen Garden - Aura</title>
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        :root {
            --bg-cream: #FDFBF7;
            --sage-green: #9CBFA7;
            --text-dark: #373F41;
            --text-muted: #828B8E;
        }

        body,
        html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: var(--bg-cream);
            font-family: 'Inter', system-ui, sans-serif;
            overflow: hidden;
            touch-action: none;
            user-select: none;
        }

        body::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.05'/%3E%3C/svg%3E");
            pointer-events: none;
            z-index: 1;
        }

        /* Header UI overlay */
        header {
            position: absolute;
            top: 20px;
            left: 20px;
            right: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 10;
        }

        .back-btn {
            background: #fff;
            color: var(--text-dark);
            border: none;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05);
            cursor: pointer;
            text-decoration: none;
            transition: transform 0.2s;
        }

        .back-btn:active {
            transform: scale(0.9);
        }

        .header-title {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
            padding: 8px 16px;
            border-radius: 20px;
            font-weight: 600;
            color: var(--sage-green);
            font-size: 0.95rem;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.02);
            pointer-events: none;
        }

        .tool-btn {
            background: #fff;
            color: var(--text-muted);
            border: none;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05);
            cursor: pointer;
            transition: all 0.3s;
        }

        .tool-btn.active {
            color: var(--sage-green);
            background: var(--bg-cream);
            border: 2px solid var(--sage-green);
        }

        /* Tools Palette */
        .palette {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 15px;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(15px);
            padding: 12px;
            border-radius: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
            z-index: 10;
        }

        #canvas-container {
            width: 100%;
            height: 100%;
        }

        /* Initial Instruction */
        .instruction {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: var(--text-muted);
            font-size: 1rem;
            letter-spacing: 1px;
            pointer-events: none;
            transition: opacity 1s;
            text-align: center;
            z-index: 5;
        }
    </style>
    <!-- Include p5.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
</head>

<body>

    <header>
        <a href="wellbeing-hub.html" class="back-btn"><i class="ph ph-arrow-left"></i></a>
        <div class="header-title">The Zen Garden</div>
        <button class="tool-btn" onclick="clearGarden()"><i class="ph ph-trash"></i></button>
    </header>

    <div class="instruction" id="instruct">Rake the sand slowly...</div>

    <div class="palette">
        <button class="tool-btn active" id="rakeBtn" onclick="setTool('rake')"><i class="ph-fill ph-waves"></i></button>
        <button class="tool-btn" id="stoneBtn" onclick="setTool('stone')"><i class="ph-fill ph-circle"></i></button>
    </div>

    <div id="canvas-container"></div>

    <script>
        let currentTool = 'rake'; // 'rake' or 'stone'
        let hasInteracted = false;
        let stones = [];

        function setTool(tool) {
            currentTool = tool;
            document.getElementById('rakeBtn').classList.remove('active');
            document.getElementById('stoneBtn').classList.remove('active');
            document.getElementById(`${tool}Btn`).classList.add('active');
        }

        function clearGarden() {
            background('#FDFBF7'); // Sand color
            stones = [];
        }

        // --- p5.js Sketch ---
        function setup() {
            let canvas = createCanvas(windowWidth, windowHeight);
            canvas.parent('canvas-container');
            clearGarden();
        }

        function draw() {
            if (mouseIsPressed || touches.length > 0) {
                if (!hasInteracted) {
                    hasInteracted = true;
                    document.getElementById('instruct').style.opacity = '0';
                }

                let currentX = mouseX || touches[0].x;
                let currentY = mouseY || touches[0].y;
                let pX = pmouseX;
                let pY = pmouseY;

                if (currentTool === 'rake') {
                    // Draw multiple parallel lines for a rake effect
                    strokeWeight(3);
                    stroke('rgba(210, 200, 190, 0.4)'); // Shadow part of ridge
                    for (let i = -10; i <= 10; i += 10) {
                        line(pX + i, pY + i, currentX + i, currentY + i);
                    }

                    strokeWeight(2);
                    stroke('rgba(255, 255, 255, 0.6)'); // Highlight part of ridge
                    for (let i = -8; i <= 12; i += 10) {
                        line(pX + i, pY + i, currentX + i, currentY + i);
                    }
                }
            }

            // Draw all placed stones on top of sand
            for (let s of stones) {
                noStroke();
                // Shadow
                fill('rgba(0,0,0,0.1)');
                ellipse(s.x + 5, s.y + 10, s.size * 1.1, s.size * 0.9);
                // Stone body
                fill(s.color);
                ellipse(s.x, s.y, s.size, s.size * 0.85);
            }
        }

        function mouseReleased() {
            if (currentTool === 'stone') {
                let currentX = mouseX || (touches.length > 0 ? touches[0].x : width / 2);
                let currentY = mouseY || (touches.length > 0 ? touches[0].y : height / 2);

                // Add a smooth round stone
                stones.push({
                    x: currentX,
                    y: currentY,
                    size: random(40, 80),
                    color: random(['#4A4A4A', '#6B6B6B', '#3B4045', '#8C929D'])
                });
            }
        }

        function windowResized() {
            resizeCanvas(windowWidth, windowHeight);
            clearGarden();
        }
    </script>
</body>

</html>
